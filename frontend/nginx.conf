server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend container over Docker's internal
    # network — "backend" resolves via Docker Compose's service DNS, not
    # something the browser ever needs to know about.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: any non-file, non-/api route serves index.html so React
    # Router can handle client-side routes like /contestants directly.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
